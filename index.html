<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯净音乐播放器</title>
    <link rel="stylesheet" href="css/style.css?v=20260711">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="search-wrapper">
                <div class="search-box">
                    <span class="material-icons search-icon">search</span>
                    <input type="text" id="search-input" placeholder="搜索歌手名或歌曲名..." autocomplete="off">
                    <button id="search-btn" class="search-btn">搜索</button>
                </div>
            </div>
            <button id="theme-toggle" class="theme-toggle" title="切换主题">
                <span class="material-icons">dark_mode</span>
            </button>
        </header>

        <main class="main-content">
            <div id="search-results" class="search-results">
                <div class="results-header">
                    <h2>搜索结果</h2>
                    <span id="result-count" class="result-count"></span>
                </div>
                <div id="results-list" class="results-list"></div>
            </div>

            <div id="lyrics-overlay" class="lyrics-overlay"></div>
            <div id="lyrics-panel" class="lyrics-panel">
                <div class="lyrics-drag-handle">
                    <div class="lyrics-drag-bar"></div>
                </div>
                <button id="close-lyrics" class="close-lyrics-btn">
                    <span class="material-icons">close</span>
                </button>
                <div id="lyrics-content" class="lyrics-content">
                    <div class="lyrics-header">
                        <div id="lyrics-song" class="lyrics-song"></div>
                        <div id="lyrics-artist" class="lyrics-artist"></div>
                    </div>
                    <div id="lyrics-scroll" class="lyrics-scroll">
                        <div id="lyrics-list" class="lyrics-list"></div>
                    </div>
                </div>
                <div class="lyrics-resize-handle">
                    <div class="lyrics-resize-bar"></div>
                </div>
            </div>

            <div id="download-overlay" class="download-overlay"></div>
            <div id="download-panel" class="download-panel">
                <button id="close-download" class="close-download-btn">
                    <span class="material-icons">close</span>
                </button>
                <div class="download-content">
                    <h3 id="download-title" class="download-title"></h3>
                    <p id="download-artist" class="download-artist"></p>
                    <div id="download-links" class="download-links"></div>
                    <p class="download-tip">点击链接跳转至网盘下载</p>
                </div>
            </div>

            <div id="playlist-overlay" class="playlist-overlay"></div>
            <div id="playlist-panel" class="playlist-panel">
                <div class="playlist-header">
                    <h3 class="playlist-title">播放列表</h3>
                    <span id="playlist-count" class="playlist-count">0 首</span>
                    <button id="clear-playlist" class="clear-playlist-btn" title="清空列表">
                        <span class="material-icons">delete_sweep</span>
                    </button>
                    <button id="close-playlist" class="close-playlist-btn">
                        <span class="material-icons">close</span>
                    </button>
                </div>
                <div id="playlist-scroll" class="playlist-scroll">
                    <div id="playlist-list" class="playlist-list"></div>
                </div>
                <div class="playlist-empty" id="playlist-empty">
                    <span class="material-icons">queue_music</span>
                    <p>播放列表为空</p>
                    <p class="playlist-empty-tip">从搜索结果中添加歌曲</p>
                </div>
            </div>

            <div id="empty-state" class="empty-state">
                <span class="material-icons empty-icon">music_note</span>
                <p>输入关键词搜索歌曲</p>
            </div>
        </main>

        <footer class="player-bar">
            <div class="player-info">
                <div class="album-cover">
                    <span class="material-icons">music_note</span>
                </div>
                <div class="song-info">
                    <span id="current-song" class="song-name">暂无播放</span>
                    <span id="current-artist" class="artist-name"></span>
                </div>
            </div>

            <div class="player-controls">
                <button id="play-mode-btn" class="control-btn play-mode-btn" title="播放模式">
                    <span class="material-icons">repeat</span>
                </button>
                <button id="prev-btn" class="control-btn" title="上一曲">
                    <span class="material-icons">skip_previous</span>
                </button>
                <button id="play-pause-btn" class="control-btn play-btn" title="播放/暂停">
                    <span class="material-icons">play_arrow</span>
                </button>
                <button id="next-btn" class="control-btn" title="下一曲">
                    <span class="material-icons">skip_next</span>
                </button>
                <button id="playlist-btn" class="control-btn" title="播放列表">
                    <span class="material-icons">queue_music</span>
                </button>
                <button id="lyrics-btn" class="control-btn" title="歌词">
                    <span class="material-icons">lyrics</span>
                </button>
            </div>

            <div class="progress-wrapper">
                <span id="current-time" class="time-label">0:00</span>
                <div id="progress-bar" class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                    <div id="progress-thumb" class="progress-thumb"></div>
                </div>
                <span id="total-time" class="time-label">0:00</span>
            </div>

            <div class="volume-wrapper">
                <button id="volume-toggle" class="volume-btn" title="静音/取消静音">
                    <span class="material-icons">volume_up</span>
                </button>
                <div id="volume-bar" class="volume-bar">
                    <div id="volume-fill" class="volume-fill"></div>
                </div>
            </div>
        </footer>
    </div>

    <div id="toast" class="toast"></div>

    <audio id="audio-player" preload="metadata"></audio>

    <script src="js/app.js?v=20260711"></script>
</body>
</html>
